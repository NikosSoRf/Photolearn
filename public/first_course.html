<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курс - PhotoLearn</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/course.css">
    <style>
        /* Стили для модулей курса */
.course-module {
    background: #fff;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-left: 4px solid #3498db;
}

.module-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.module-header h3 {
    margin: 0;
    color: #2c3e50;
    font-size: 1.2rem;
}

.module-lessons-count {
    background: #ecf0f1;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.9rem;
    color: #7f8c8d;
}

.module-description {
    color: #555;
    margin-bottom: 15px;
    line-height: 1.5;
}

.module-lessons {
    margin-top: 15px;
}

.lesson-item {
    display: flex;
    align-items: flex-start;
    padding: 12px;
    margin-bottom: 10px;
    background: #f8f9fa;
    border-radius: 6px;
    border-left: 3px solid #95a5a6;
}

.lesson-item:hover {
    background: #edf2f7;
}

.lesson-icon {
    font-size: 1.5rem;
    margin-right: 15px;
    width: 40px;
    text-align: center;
}

.lesson-info h4 {
    margin: 0 0 5px 0;
    font-size: 1rem;
    color: #34495e;
}

.lesson-info p {
    margin: 0 0 8px 0;
    color: #666;
    font-size: 0.9rem;
}

.lesson-duration {
    font-size: 0.8rem;
    color: #7f8c8d;
    background: #ecf0f1;
    padding: 2px 8px;
    border-radius: 10px;
}

.no-lessons {
    color: #95a5a6;
    font-style: italic;
    text-align: center;
    padding: 20px;
}
        /* Добавьте эти стили для отладки */
        .debug-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 0.9rem;
            color: #666;
            border-left: 4px solid #3498db;
        }
        
        .debug-info.hidden {
            display: none;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-right: 10px;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
        
        .btn-success {
            background: #2ecc71;
            color: white;
        }
        
        .btn-secondary {
            background: #95a5a6;
            color: white;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: #3498db;
        }
        
        .error-message {
            text-align: center;
            padding: 100px 20px;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2><a href="/" style="color: inherit; text-decoration: none;">PhotoLearn</a></h2>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Главная</a>
                <a href="/courses" class="nav-link">Курсы</a>
                <a href="/login" class="nav-link">Войти</a>
                <a href="/register" class="nav-link nav-button">Регистрация</a>
            </div>
        </div>
    </nav>

    <main class="course-container">
        <!-- Отладочная информация -->
        <div id="debug-info" class="debug-info hidden">
            <strong>Отладка:</strong>
            <div>ID курса: <span id="debug-course-id">-</span></div>
            <div>Токен: <span id="debug-token">-</span></div>
            <div>Роль: <span id="debug-role">-</span></div>
            <div>Отложенная запись: <span id="debug-pending">-</span></div>
            <div style="margin-top: 10px;">
                <button onclick="testEnrollment()" class="btn btn-secondary" style="padding: 5px 10px; font-size: 0.8rem;">
                    Тест API записи
                </button>
                <button onclick="clearLocalStorage()" class="btn btn-secondary" style="padding: 5px 10px; font-size: 0.8rem;">
                    Очистить localStorage
                </button>
            </div>
        </div>
        
        <div id="course-loading" class="loading">
            <div class="spinner"></div>
            <p>Загрузка курса...</p>
        </div>
        
        <div id="course-content" style="display: none;">
            <!-- Заголовок курса -->
            <header class="course-header">
                <div class="course-level-badge" id="course-level"></div>
                <h1 id="course-title"></h1>
                <p id="course-description"></p>
                <div class="course-meta">
                    <span id="course-teacher"></span>
                    <span id="course-price"></span>
                    <span id="course-duration"></span>
                </div>
                
                <!-- Кнопки действий -->
                <div class="course-actions">
                    <button id="enroll-btn" class="btn btn-primary">Записаться на курс</button>
                    <button id="go-to-course-btn" class="btn btn-success" style="display: none;">
                        Перейти к обучению
                    </button>
                    <button onclick="window.history.back()" class="btn btn-secondary">
                        ← Назад к курсам
                    </button>
                </div>
                
                <!-- Информация о статусе -->
                <div id="enrollment-status" style="margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 5px; display: none;">
                    <span id="status-text"></span>
                </div>
            </header>

            <!-- Структура курса -->
            <section class="course-structure">
                <h2>Содержание курса</h2>
                <div id="modules-container">
                </div>
            </section>

            <!-- Видео-звонки -->
            <section class="video-calls" id="video-calls-section" style="display: none;">
                <h2>Онлайн-встречи с преподавателем</h2>
                <div id="video-calls-container"></div>
            </section>
        </div>

        <div id="course-error" class="error-message" style="display: none;">
            Не удалось загрузить курс. Попробуйте позже.
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 PhotoLearn. Все права защищены.</p>
        </div>
    </footer>

    <script src="/js/course-page.js"></script> 
    <script src="/js/auth-check.js"></script>


</body>
</html>
