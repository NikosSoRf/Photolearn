<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание курса - PhotoLearn</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/course.css">
    <link rel="stylesheet" href="/css/create.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/dashboard.html" class="nav-logo">
                <h2 style="margin: 0; display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 1.5rem;">📷</span> PhotoLearn
                </h2>
            </a>
            <div class="nav-menu">
                <a href="/dashboard.html" class="nav-link">Главная</a>
                <a href="/courses.html" class="nav-link">Курсы</a>
                <button onclick="logout()" class="btn nav-button" style="padding: 10px 20px;">Выйти</button>
            </div>
        </div>
    </nav>

    <main class="create-course-container">
        <div class="page-header">
            <h1>Создание нового курса</h1>
            <p>Заполните информацию о курсе для студентов</p>
        </div>
        
        <form id="create-course-form" class="form-section">
            <div class="form-group">
                <label for="course-title" class="form-label">Название курса *</label>
                <input type="text" id="course-title" class="form-control" required 
                       placeholder="Например: Основы фотографии для начинающих">
            </div>
            
            <div class="form-group">
                <label for="course-description" class="form-label">Описание курса *</label>
                <textarea id="course-description" class="form-control form-textarea" required
                          placeholder="Подробное описание того, что студенты узнают на курсе..."></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="course-level" class="form-label">Уровень сложности</label>
                    <select id="course-level" class="form-control">
                        <option value="basic">Базовый</option>
                        <option value="intermediate">Средний</option>
                        <option value="advanced">Продвинутый</option>
                        <option value="specialized">Специализация</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="course-price" class="form-label">Цена курса (руб.)</label>
                    <input type="number" id="course-price" class="form-control" 
                           placeholder="0" min="0" step="100">
                </div>
            </div>
            
            <div class="form-group">
                <label for="video-call-link" class="form-label">Ссылка на видео-встречи (опционально)</label>
                <input type="url" id="video-call-link" class="form-control" 
                       placeholder="https://meet.google.com/xxx-xxxx-xxx">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-create">Создать курс</button>
                <button type="button" onclick="window.history.back()" class="btn btn-secondary">
                    Отмена
                </button>
            </div>
        </form>
        
        <div id="message-container"></div>
    </main>

    <script src="/js/auth-check.js"></script>
    <script src="/js/create-course.js"></script>
</body>
</html>
