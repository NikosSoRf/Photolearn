<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курсы - PhotoLearn</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/cursstyle.css">
    <style>
        /* Дополнительные стили для динамического контента */
        .no-courses {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }
        
        .no-courses p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #666;
        }
        
        .loading-courses {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
            color: #667eea;
        }
        
        .error-message {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
            color: #e74c3c;
        }
        
        .course-card a.btn {
            display: block;
            width: 100%;
            text-align: center;
            margin-top: 15px;
        }
        
        .course-teacher {
            font-size: 0.9rem;
            color: #666;
            margin: 10px 0;
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2><a href="/" style="color: inherit; text-decoration: none;">PhotoLearn</a></h2>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Главная</a>
                <a href="/courses" class="nav-link active">Курсы</a>
                <a href="/login" class="nav-link">Войти</a>
                <a href="/register" class="nav-link nav-button">Регистрация</a>
            </div>
        </div>
    </nav>

    <!-- Контент страницы курсов -->
    <section class="courses-section" style="padding: 100px 0; margin-top: 70px;">
        <div class="container">
            <h1 class="section-title">Наши курсы фотографии</h1>
            <p class="section-subtitle" style="text-align: center; margin-bottom: 50px; font-size: 1.2rem;">
                Выберите подходящий курс и начните свой путь в фотографии
            </p>

            <div class="courses-grid" id="courses-container">
            </div>
            
            <!-- кнопка создания тестовых данных -->
            <div style="text-align: center; margin-top: 40px; display: none;" id="dev-tools">
                <button onclick="createTestCourse()" class="btn btn-secondary">
                    Создать тестовый курс
                </button>
                <p style="font-size: 0.9rem; color: #666; margin-top: 10px;">
                    (только для разработки)
                </p>
            </div>
        </div>
    </section>

    <!-- Футер -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 PhotoLearn. Все права защищены.</p>
        </div>
    </footer>

    <script src="/js/courses-list.js"></script>
    <script src="/js/auth-check.js"></script>
</body>
</html>
